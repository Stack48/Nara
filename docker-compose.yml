services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nara
      POSTGRES_PASSWORD: nara_secret
      POSTGRES_DB: nara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nara -d nara"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://nara:nara_secret@db:5432/nara
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # Développement : code monté depuis l’hôte, hot reload (make up)
  app-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - app_dev_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nara:nara_secret@db:5432/nara
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache libc6-compat openssl >/dev/null
        if [ ! -x node_modules/.bin/next ]; then
          echo "npm ci (premier démarrage ou volume vide)..."
          npm ci
        fi
        exec npm run dev:docker

  # Production (image standalone) : make up-prod
  app:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nara:nara_secret@db:5432/nara
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  app_dev_node_modules:
